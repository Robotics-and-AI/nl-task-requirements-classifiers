version: 1
description: Scenario templates for synthetic robot task instructions. Requirements use [mobility_level, manipulation_level,
  payload_level].
placeholder_contract:
  w: Sampled payload weight in kilograms, formatted by templates such as {w:.2f}.
  d: Sampled manipulation/reach distance in centimeters.
  units: Sampled integer count of items/parts/tools.
  adj1: Sampled adjective from options.size_adjectives.
  adj2: Second independently sampled adjective from options.size_adjectives.
  place_src: Sampled source location from options.places.
  place_dst: Sampled destination location from options.places; different from place_src when possible.
  x1_y1_x2_y2: Sampled coordinates in meters when x_m and y_m ranges are present.
review_summary:
  source_file: templates.py
  scenarios_found: 46
  requirements_found: 46
  train_templates_before_normalization: 920
  eval_templates_before_normalization: 229
  train_templates_after_normalization: 920
  eval_templates_after_normalization: 230
  structural_fixes_applied:
  - 'scenario22: duplicate distance_range found in source; YAML keeps the effective final value [91, 130].'
  - 'scenario32: one concatenated eval template was split into two separate eval templates.'
scenarios:
  scenario1:
    requirements:
      mobility_level: 1
      manipulation_level: 2
      payload_level: 1
    ranges:
      weight_kg:
      - 0.01
      - 3.0
      reach_cm:
      - 1
      - 50
    options:
      units:
      - 1
      - 2
      - 3
      size_adjectives:
      - small
      - tiny
      - lightweight
      - delicate
      - light
      - small light
      places:
      - warehouse
      - assembly line
      - station A
      - station B
      - station C
      - workshop
      - quality control room
      - workstation
      - maintenance zone
      - logistics area
      - assembly zone
      - inspection station
      - storage
      - office
      - production floor
    template_counts:
      train: 20
      eval: 5
    templates:
      train:
      - Manipulate a {w:.2f} kg load within a {d} cm range no mobility required
      - Pick up {units} parts that are up to {d} cm radius with no repositioning needed
      - Help the operator close with the assemble of the {adj1} parts without relocating
      - Manipulate loads of up to {w:.2f} kg within a {d} cm range with no change in location
      - Pick up {adj1} and {adj2} components within a {d} cm radius done in place
      - Assist the operator in assembling the {adj1} components from a fixed position
      - Pick up {w:.2f} kg load within {d} cm range requiring no relocation
      - Sort {adj1} parts within {d} cm without moving to other location
      - Handle objects weighing up to {w:.2f} kg within a {d} cm reach with no need for mobility
      - Transfer {adj1} items within a {d} cm working radius from a fixed position
      - Lift {adj1} tools or parts within a {d} cm range no mobility expected
      - Place a {w:.2f} kg load accurately within a {d} cm workspace without needing to move
      - Pick and place elements weighing up to {w:.2f} kg within a short range without relocating
      - Pick and place components weighing {w:.2f} kg nearby requiring no movement
      - Grasp and move {adj1} objects within a {d} cm radius from a fixed position
      - Lift and place components weighing up to {w:.2f} kg within a {d} cm range no mobility required
      - Pick up and relocate {adj1} mechanical elements within a {d} cm reach without needing to move to other place
      - Precisely handle and place {w:.2f} kg components in the workspace next to you
      - Manipulate {units} items within a confined {d} cm radius no repositioning needed
      - Perform pick-and-place tasks involving objects up to {w:.2f} kg that are close requiring no movement to other place
      eval:
      - Handle and place {w:.2f} kg components within a {d} cm radius with no mobility required
      - Pick and place {adj1} items accurately within a {d} cm range with no change in location
      - Assist in assembling {adj1} mechanical parts nearby with zero mobility demand
      - Move and arrange {w:.2f} kg tools within a confined {d} cm workspace without needing to move
